name: Supabase Keepalive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          set -euo pipefail

          EXPECTED_PATH="/api/cron/supabase-keepalive"

          if [ -z "$KEEPALIVE_URL" ] || [ -z "$KEEPALIVE_SECRET" ]; then
            echo "Missing KEEPALIVE_URL or KEEPALIVE_SECRET repository secret."
            exit 1
          fi

          echo "Pinging configured keepalive URL..."
          status="$(curl --output /dev/null --write-out "%{http_code}" --show-error --silent \
            -H "Authorization: Bearer $KEEPALIVE_SECRET" \
            "$KEEPALIVE_URL" || true)"

          if [ "$status" = "200" ]; then
            echo "Keepalive request succeeded."
            exit 0
          fi

          echo "Configured URL returned HTTP $status."

          origin="$(printf '%s' "$KEEPALIVE_URL" | sed -E 's#^(https?://[^/]+).*$#\1#')"
          fallback_url="${origin}${EXPECTED_PATH}"

          if [ "$status" = "404" ] && [ "$fallback_url" != "$KEEPALIVE_URL" ]; then
            echo "Trying fallback keepalive URL on same host..."
            fallback_status="$(curl --output /dev/null --write-out "%{http_code}" --show-error --silent \
              -H "Authorization: Bearer $KEEPALIVE_SECRET" \
              "$fallback_url" || true)"

            if [ "$fallback_status" = "200" ]; then
              echo "Fallback keepalive request succeeded: $fallback_url"
              exit 0
            fi

            echo "Fallback URL returned HTTP $fallback_status."
          fi

          echo "Keepalive failed. Ensure KEEPALIVE_URL points to ${EXPECTED_PATH} and KEEPALIVE_SECRET matches server config."
          exit 1
